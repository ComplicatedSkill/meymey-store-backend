services:
  api:
    image: radyhak/shumeiistore:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shumeiistore-api
    restart: unless-stopped
    ports:
      - "3030:3030"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
